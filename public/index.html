<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CM Cloud — Ideas Board</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 0.75rem; }
    .brand-mark {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-weight: 700;
      font-size: 0.875rem;
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      letter-spacing: 0.05em;
    }
    .brand-name { font-weight: 600; font-size: 1rem; color: #f1f5f9; }
    .runtime-badge {
      font-size: 0.75rem;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
    }
    .runtime-badge span { color: #6ee7b7; font-weight: 600; }
    main { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    h1 { font-size: 1.75rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.375rem; }
    .subtitle { color: #64748b; font-size: 0.9375rem; margin-bottom: 2rem; }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1rem; font-weight: 600; color: #cbd5e1; margin-bottom: 1rem; }
    .form-row { display: flex; flex-direction: column; gap: 0.75rem; }
    input[type="text"], textarea {
      background: #0f1117;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 0.625rem 0.875rem;
      font-size: 0.9375rem;
      font-family: inherit;
      width: 100%;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #6366f1;
    }
    textarea { resize: vertical; min-height: 80px; }
    .form-footer { display: flex; align-items: center; gap: 0.75rem; }
    input[name="author"] { flex: 1; }
    button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.625rem 1.25rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .ideas-list { display: flex; flex-direction: column; gap: 0.875rem; }
    .idea-card {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
    .idea-body { flex: 1; min-width: 0; }
    .idea-title { font-weight: 600; color: #f1f5f9; font-size: 0.9375rem; margin-bottom: 0.25rem; }
    .idea-desc { color: #94a3b8; font-size: 0.875rem; line-height: 1.5; margin-bottom: 0.5rem; }
    .idea-meta { font-size: 0.75rem; color: #475569; }
    .idea-meta strong { color: #6366f1; }
    .delete-btn {
      background: none;
      border: 1px solid #334155;
      color: #64748b;
      padding: 0.25rem 0.6rem;
      font-size: 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .delete-btn:hover { border-color: #ef4444; color: #ef4444; background: none; opacity: 1; }
    .empty { color: #475569; text-align: center; padding: 2rem 0; font-size: 0.9375rem; }
    .status-bar {
      font-size: 0.75rem;
      color: #475569;
      text-align: center;
      margin-top: 1.5rem;
    }
    .status-bar a { color: #6366f1; text-decoration: none; }
    .error-notice {
      background: #1f1315;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.875rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">CM</div>
      <span class="brand-name">CM Cloud · Ideas Board</span>
    </div>
    <div class="runtime-badge">runtime: <span id="runtime-label">node</span></div>
  </header>

  <main>
    <h1>Team Ideas Board</h1>
    <p class="subtitle">Powered by Node.js on CM Cloud App Deploy + PocketBase backend</p>

    <div id="error-box" class="error-notice" style="display:none"></div>

    <div class="card">
      <h2>Share an idea</h2>
      <form id="idea-form">
        <div class="form-row">
          <input type="text" name="title" placeholder="Idea title" required maxlength="200" />
          <textarea name="description" placeholder="Describe your idea..." maxlength="2000"></textarea>
          <div class="form-footer">
            <input type="text" name="author" placeholder="Your name" maxlength="100" />
            <button type="submit" id="submit-btn">Post Idea</button>
          </div>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>All ideas <span id="count" style="color:#475569;font-weight:400"></span></h2>
      <div class="ideas-list" id="ideas-list">
        <p class="empty">Loading…</p>
      </div>
    </div>

    <p class="status-bar" id="status-bar">Connecting to PocketBase…</p>
  </main>

  <script>
    let pbUrl = "";

    async function init() {
      try {
        const cfg = await fetch("/api/config").then(r => r.json());
        pbUrl = cfg.pocketbase_url || "";
        if (!pbUrl) {
          showError("POCKETBASE_URL is not configured. Set it in your App Deploy environment variables.");
          return;
        }
        await loadIdeas();
        setInterval(loadIdeas, 5000);
      } catch (err) {
        showError("Could not reach the Node.js server: " + err.message);
      }
    }

    async function loadIdeas() {
      try {
        const res = await fetch(`${pbUrl}/api/collections/ideas/records?sort=-created&perPage=50`);
        if (!res.ok) {
          if (res.status === 404) {
            showError('PocketBase "ideas" collection not found. Create it in the PocketBase admin panel (/_ ) with fields: title (text), description (text), author (text).');
          } else {
            showError(`PocketBase returned ${res.status}. Check that the collection rules allow public access.`);
          }
          return;
        }
        hideError();
        const data = await res.json();
        renderIdeas(data.items || []);
        document.getElementById("status-bar").innerHTML =
          `Connected to <a href="${pbUrl}/_/" target="_blank" rel="noreferrer">PocketBase</a> · auto-refreshes every 5s`;
      } catch (err) {
        showError("Cannot reach PocketBase at " + pbUrl + ". Check the URL and that the service is running.");
      }
    }

    function renderIdeas(items) {
      const list = document.getElementById("ideas-list");
      document.getElementById("count").textContent = items.length ? `(${items.length})` : "";
      if (!items.length) {
        list.innerHTML = '<p class="empty">No ideas yet — be the first to share one!</p>';
        return;
      }
      list.innerHTML = items.map(item => `
        <div class="idea-card" id="idea-${item.id}">
          <div class="idea-body">
            <div class="idea-title">${esc(item.title)}</div>
            ${item.description ? `<div class="idea-desc">${esc(item.description)}</div>` : ""}
            <div class="idea-meta">
              By <strong>${esc(item.author || "Anonymous")}</strong> ·
              ${new Date(item.created).toLocaleString()}
            </div>
          </div>
          <button class="delete-btn" onclick="deleteIdea('${item.id}')">Delete</button>
        </div>
      `).join("");
    }

    async function deleteIdea(id) {
      if (!confirm("Delete this idea?")) return;
      try {
        await fetch(`${pbUrl}/api/collections/ideas/records/${id}`, { method: "DELETE" });
        document.getElementById("idea-" + id)?.remove();
        await loadIdeas();
      } catch (err) {
        showError("Delete failed: " + err.message);
      }
    }

    document.getElementById("idea-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Posting…";
      const fd = new FormData(e.target);
      try {
        const res = await fetch(`${pbUrl}/api/collections/ideas/records`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title: fd.get("title"),
            description: fd.get("description"),
            author: fd.get("author") || "Anonymous",
          }),
        });
        if (!res.ok) throw new Error(`PocketBase ${res.status}`);
        e.target.reset();
        await loadIdeas();
      } catch (err) {
        showError("Could not post idea: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Post Idea";
      }
    });

    function showError(msg) {
      const el = document.getElementById("error-box");
      el.textContent = msg;
      el.style.display = "block";
    }
    function hideError() {
      document.getElementById("error-box").style.display = "none";
    }
    function esc(str) {
      return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    init();
  </script>
</body>
</html>
