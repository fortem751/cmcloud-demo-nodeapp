<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CM Cloud App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #6366f1;
      --accent-dim: #6366f120;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #FFFFFF;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 0.875rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 0.75rem; }
    .brand-mark {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 0.8125rem;
      padding: 0.3rem 0.55rem;
      border-radius: 6px;
      letter-spacing: 0.05em;
    }
    .brand-name { font-weight: 600; font-size: 0.9375rem; color: #f1f5f9; }
    .header-right { display: flex; align-items: center; gap: 0.75rem; }
    .runtime-badge {
      font-size: 0.6875rem;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
    }
    .runtime-badge span { color: #6ee7b7; font-weight: 600; }
    .live-dot {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.6875rem; color: #475569;
    }
    .live-dot::before {
      content: "";
      display: block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.85); }
    }

    /* ── Layout ── */
    main { max-width: 780px; margin: 0 auto; padding: 2.25rem 1.5rem 3rem; }
    h1 { font-size: 1.625rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.25rem; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 2rem; }

    /* ── Cards ── */
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 1.375rem;
      margin-bottom: 1.375rem;
    }
    .card-title {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #475569;
      margin-bottom: 1rem;
    }

    /* ── Form ── */
    .form-row { display: flex; flex-direction: column; gap: 0.625rem; }
    input[type="text"], textarea {
      background: #0f1117;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 0.6rem 0.875rem;
      font-size: 0.9375rem;
      font-family: inherit;
      width: 100%;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea { resize: vertical; min-height: 72px; }
    .form-footer { display: flex; gap: 0.625rem; }
    .form-footer input { flex: 1; }
    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.25rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    button.primary:hover { opacity: 0.85; }
    button.primary:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Ideas list ── */
    .ideas-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .count-badge {
      font-size: 0.75rem;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-weight: 600;
    }
    .ideas-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .idea-card {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 0.875rem 1.125rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .idea-body { flex: 1; min-width: 0; }
    .idea-title { font-weight: 600; color: #f1f5f9; font-size: 0.9375rem; margin-bottom: 0.2rem; }
    .idea-desc  { color: #94a3b8; font-size: 0.875rem; line-height: 1.5; margin-bottom: 0.4rem; }
    .idea-meta  { font-size: 0.6875rem; color: #475569; }
    .idea-meta strong { color: var(--accent); }
    .delete-btn {
      background: none;
      border: 1px solid #334155;
      color: #475569;
      padding: 0.2rem 0.55rem;
      font-size: 0.6875rem;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .delete-btn:hover { border-color: #ef4444; color: #ef4444; background: none; }

    /* ── States ── */
    .empty { color: #475569; text-align: center; padding: 2rem 0; font-size: 0.9rem; }
    .error-notice {
      background: #1f1315;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    /* ── PocketBase info strip ── */
    .pb-strip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: #475569;
      margin-top: 1.25rem;
    }
    .pb-strip a { color: var(--accent); text-decoration: none; }
    .pb-strip a:hover { text-decoration: underline; }
    .pb-pill {
      background: #1e293b;
      border: 1px solid #2d3148;
      border-radius: 999px;
      padding: 0.2rem 0.6rem;
      font-size: 0.6875rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">CM</div>
      <span class="brand-name" id="app-title">Loading…</span>
    </div>
    <div class="header-right">
      <div class="live-dot">live</div>
      <div class="runtime-badge">runtime: <span>node</span></div>
    </div>
  </header>

  <main>
    <h1 id="page-title">Ideas Board</h1>
    <p class="subtitle">Node.js · CM Cloud App Deploy · PocketBase backend &mdash; <strong style="color:var(--accent)">v2</strong></p>

    <div id="error-box" class="error-notice" style="display:none"></div>

    <div class="card">
      <div class="card-title">Share an idea</div>
      <form id="idea-form">
        <div class="form-row">
          <input type="text" name="title" placeholder="Idea title" required maxlength="200" />
          <textarea name="description" placeholder="Describe your idea…" maxlength="2000"></textarea>
          <div class="form-footer">
            <input type="text" name="author" placeholder="Your name" maxlength="100" />
            <button type="submit" id="submit-btn" class="primary">Post Idea</button>
          </div>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="ideas-header">
        <div class="card-title" style="margin-bottom:0">All ideas</div>
        <span class="count-badge" id="count" style="display:none"></span>
      </div>
      <div class="ideas-list" id="ideas-list">
        <p class="empty">Connecting to PocketBase…</p>
      </div>
    </div>

    <div class="pb-strip" id="pb-strip" style="display:none">
      <span class="pb-pill">PocketBase</span>
      <a id="pb-link" href="#" target="_blank" rel="noreferrer">Open admin panel</a>
      <span>· refreshes every 3s</span>
    </div>
  </main>

  <script>
    let pbUrl = "";

    async function init() {
      try {
        const cfg = await fetch("/api/config").then(r => r.json());
        pbUrl = (cfg.pocketbase_url || "").replace(/\/$/, "");

        // Apply env-driven branding
        const title = cfg.app_title || "Ideas Board";
        document.title = title + " · CM Cloud";
        document.getElementById("app-title").textContent = title;
        document.getElementById("page-title").textContent = title;

        const accent = cfg.app_accent || "#6366f1";
        document.documentElement.style.setProperty("--accent", accent);
        document.documentElement.style.setProperty("--accent-dim", accent + "20");

        if (!pbUrl) {
          showError("POCKETBASE_URL is not set. Add it in your App Deploy environment variables, then redeploy.");
          return;
        }

        // PocketBase admin link
        const pbLink = document.getElementById("pb-link");
        pbLink.href = pbUrl + "/_/";
        document.getElementById("pb-strip").style.display = "flex";

        await loadIdeas();
        setInterval(loadIdeas, 3000);
      } catch (err) {
        showError("Could not reach Node.js server: " + err.message);
      }
    }

    async function loadIdeas() {
      try {
        const res = await fetch(`${pbUrl}/api/collections/ideas/records?sort=-created&perPage=50`);
        if (!res.ok) {
          if (res.status === 404) {
            showError(
              'PocketBase "ideas" collection not found.\n' +
              'Go to the PocketBase admin panel → New collection → name it "ideas" → add fields:\n' +
              '  title (text, required)  ·  description (text)  ·  author (text)\n' +
              'Then set List/View API rules to empty (public).'
            );
          } else {
            showError(`PocketBase returned HTTP ${res.status}. Check collection API rules allow public list/view.`);
          }
          return;
        }
        hideError();
        const data = await res.json();
        renderIdeas(data.items || []);
      } catch {
        showError(`Cannot reach PocketBase at ${pbUrl}. Is the PocketBase service running?`);
      }
    }

    function renderIdeas(items) {
      const list = document.getElementById("ideas-list");
      const countEl = document.getElementById("count");
      if (items.length) {
        countEl.textContent = items.length;
        countEl.style.display = "inline";
      } else {
        countEl.style.display = "none";
      }
      if (!items.length) {
        list.innerHTML = '<p class="empty">No ideas yet — post the first one above!</p>';
        return;
      }
      list.innerHTML = items.map(item => `
        <div class="idea-card" id="idea-${esc(item.id)}">
          <div class="idea-body">
            <div class="idea-title">${esc(item.title)}</div>
            ${item.description ? `<div class="idea-desc">${esc(item.description)}</div>` : ""}
            <div class="idea-meta">
              By <strong>${esc(item.author || "Anonymous")}</strong> &middot;
              ${new Date(item.created).toLocaleString()}
            </div>
          </div>
          <button class="delete-btn" onclick="deleteIdea('${esc(item.id)}')">✕</button>
        </div>
      `).join("");
    }

    async function deleteIdea(id) {
      if (!confirm("Delete this idea?")) return;
      try {
        await fetch(`${pbUrl}/api/collections/ideas/records/${id}`, { method: "DELETE" });
        await loadIdeas();
      } catch (err) {
        showError("Delete failed: " + err.message);
      }
    }

    document.getElementById("idea-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Posting…";
      const fd = new FormData(e.target);
      try {
        const res = await fetch(`${pbUrl}/api/collections/ideas/records`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title:       fd.get("title"),
            description: fd.get("description"),
            author:      fd.get("author") || "Anonymous",
          }),
        });
        if (!res.ok) throw new Error(`PocketBase ${res.status}`);
        e.target.reset();
        await loadIdeas();
      } catch (err) {
        showError("Could not post idea: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Post Idea";
      }
    });

    function showError(msg) {
      const el = document.getElementById("error-box");
      el.style.whiteSpace = "pre-line";
      el.textContent = msg;
      el.style.display = "block";
    }
    function hideError() {
      document.getElementById("error-box").style.display = "none";
    }
    function esc(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    init();
  </script>
</body>
</html>
